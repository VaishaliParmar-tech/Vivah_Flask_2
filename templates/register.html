{% extends "base.html" %}
{% block title %}Register – Vivah{% endblock %}
{% block extra_head %}
<style>
.auth-page{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:60px 20px;background:linear-gradient(135deg,var(--ivory) 60%,rgba(139,26,26,0.06) 100%)}
.auth-card{background:white;width:100%;max-width:500px;box-shadow:0 8px 40px rgba(0,0,0,0.1);overflow:hidden}
.auth-header{background:linear-gradient(135deg,var(--crimson),var(--charcoal));padding:36px;text-align:center;color:white}
.auth-header .logo{font-family:var(--font-heading);font-size:30px;letter-spacing:5px;color:var(--gold-light)}
.auth-header p{font-size:14px;opacity:.8;margin-top:6px;font-style:italic}
.auth-body{padding:36px}
.auth-footer{text-align:center;padding:18px 36px 28px;font-family:var(--font-sans);font-size:13px;color:var(--warm-gray);border-top:1px solid var(--ivory-dark)}
.auth-footer a{color:var(--crimson);font-weight:700}
.password-wrap{position:relative}
.password-wrap input{padding-right:44px}
.password-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--warm-gray);font-size:15px}
.pw-strength{height:4px;margin-top:6px;border-radius:2px;background:var(--ivory-dark);overflow:hidden}
.pw-strength-bar{height:100%;width:0;transition:all 0.3s ease;border-radius:2px}
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">VIVAH</div>
      <p>Create your account and start shopping</p>
    </div>
    <div class="auth-body">
      <form method="POST" action="{{ url_for('register') }}">
        <input type="hidden" name="next" value="{{ next }}" />
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="name" required placeholder="Your full name" />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="+91 XXXXX XXXXX" />
          </div>
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" name="email" required placeholder="your@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password * <small style="color:var(--warm-gray);text-transform:none;letter-spacing:0;">(min 6 chars)</small></label>
          <div class="password-wrap">
            <input type="password" name="password" id="regPw" required placeholder="Create a strong password" oninput="checkStrength(this.value)" />
            <button type="button" class="password-toggle" onclick="togglePw('regPw',this)"><i class="fas fa-eye"></i></button>
          </div>
          <div class="pw-strength"><div class="pw-strength-bar" id="pwStrengthBar"></div></div>
        </div>
        <div class="form-group">
          <label>Confirm Password *</label>
          <div class="password-wrap">
            <input type="password" name="password2" id="regPw2" required placeholder="Re-enter your password" />
            <button type="button" class="password-toggle" onclick="togglePw('regPw2',this)"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn-crimson" style="width:100%;justify-content:center;font-size:12px;padding:14px;margin-top:8px;">
          <i class="fas fa-user-plus"></i> Create My Account
        </button>
      </form>
    </div>
    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in here</a>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePw(id,btn){
  const i=document.getElementById(id);
  if(i.type==='password'){i.type='text';btn.innerHTML='<i class="fas fa-eye-slash"></i>';}
  else{i.type='password';btn.innerHTML='<i class="fas fa-eye"></i>';}
}
function checkStrength(pw){
  const bar=document.getElementById('pwStrengthBar');
  let s=0;
  if(pw.length>=6)s+=25;if(pw.length>=10)s+=25;
  if(/[A-Z]/.test(pw))s+=25;if(/[0-9!@#$%]/.test(pw))s+=25;
  bar.style.width=s+'%';
  bar.style.background=s<=25?'#f44336':s<=50?'#FF9800':s<=75?'#FFC107':'#4CAF50';
}
</script>
{% endblock %}
