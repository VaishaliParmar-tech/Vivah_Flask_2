{% extends "base.html" %}
{% block title %}Reset Password – Vivah{% endblock %}
{% block extra_head %}
<style>
.auth-page{min-height:70vh;display:flex;align-items:center;justify-content:center;padding:60px 20px;background:linear-gradient(135deg,var(--ivory) 60%,rgba(139,26,26,0.06) 100%)}
.auth-card{background:white;width:100%;max-width:440px;box-shadow:0 8px 40px rgba(0,0,0,0.1);overflow:hidden}
.auth-header{background:linear-gradient(135deg,var(--crimson),var(--charcoal));padding:32px;text-align:center;color:white}
.auth-header .logo{font-family:var(--font-heading);font-size:28px;letter-spacing:5px;color:var(--gold-light)}
.auth-header p{font-size:14px;opacity:.8;margin-top:6px;font-style:italic}
.auth-body{padding:34px}
.step-indicator{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:24px}
.step{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:var(--font-sans)}
.step.active{background:var(--crimson);color:white}
.step.done{background:var(--gold);color:white}
.step.inactive{background:var(--ivory-dark);color:var(--warm-gray)}
.step-line{width:40px;height:2px;background:var(--ivory-dark)}
.step-line.done{background:var(--gold)}
.password-wrap{position:relative}
.password-wrap input{padding-right:44px}
.password-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--warm-gray);font-size:15px}
.password-strength{height:4px;border-radius:2px;margin-top:6px;transition:all 0.3s}
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">VIVAH</div>
      <p>Create a new password</p>
    </div>
    <div class="auth-body">
      <!-- Step Indicator -->
      <div class="step-indicator">
        <div class="step done"><i class="fas fa-check" style="font-size:12px;"></i></div>
        <div class="step-line done"></div>
        <div class="step done"><i class="fas fa-check" style="font-size:12px;"></i></div>
        <div class="step-line done"></div>
        <div class="step active">3</div>
      </div>

      <div style="text-align:center;margin-bottom:24px;">
        <i class="fas fa-shield-alt" style="font-size:36px;color:var(--gold);margin-bottom:8px;"></i>
        <p style="font-family:var(--font-sans);font-size:13px;color:var(--warm-gray);">OTP verified! Set your new password below.</p>
      </div>

      <form method="POST" action="{{ url_for('reset_password_otp') }}">
        <div class="form-group">
          <label>New Password *</label>
          <div class="password-wrap">
            <input type="password" name="password" id="p1" required placeholder="Min 6 characters" oninput="checkStrength(this.value)" />
            <button type="button" class="password-toggle" onclick="t('p1',this)"><i class="fas fa-eye"></i></button>
          </div>
          <div class="password-strength" id="pw-strength"></div>
        </div>
        <div class="form-group">
          <label>Confirm New Password *</label>
          <div class="password-wrap">
            <input type="password" name="password2" id="p2" required placeholder="Re-enter new password" />
            <button type="button" class="password-toggle" onclick="t('p2',this)"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn-crimson" style="width:100%;justify-content:center;font-size:12px;padding:14px;margin-top:8px;">
          <i class="fas fa-key"></i> Reset Password
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function t(id,btn){
  const i=document.getElementById(id);
  if(i.type==='password'){i.type='text';btn.innerHTML='<i class="fas fa-eye-slash"></i>';}
  else{i.type='password';btn.innerHTML='<i class="fas fa-eye"></i>';}
}
function checkStrength(pw){
  const bar=document.getElementById('pw-strength');
  let score=0;
  if(pw.length>=6)score++;
  if(pw.length>=10)score++;
  if(/[A-Z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  const colors=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#27ae60'];
  const widths=['20%','40%','60%','80%','100%'];
  if(pw.length===0){bar.style.width='0';return;}
  bar.style.width=widths[Math.min(score,4)];
  bar.style.background=colors[Math.min(score,4)];
}
</script>
{% endblock %}
